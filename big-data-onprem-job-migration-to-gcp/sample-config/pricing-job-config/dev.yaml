# Job-level config for pricing_nightly_batch — dev environment.
# Loaded via ConfigLoader per 07-spark-migration/05-configuration-management-and-secrets.md.
# No secrets here — secret:// references are resolved from Secret Manager at runtime.

pricing:
  input_path: "gs://acme-dev-pricing-raw/daily_price_snapshot/"
  zone_lookup_path: "gs://acme-dev-pricing-raw/zone_lookup/"
  output_path: "gs://acme-dev-pricing-curated/daily_price_snapshot/"
  discount_cap_percent: 40
  db_password: "secret://pricing-db-password-dev"

spark:
  shuffle_partitions: 50  # smaller than prod — lower dev data volume
