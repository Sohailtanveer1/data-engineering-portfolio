name: Spark Job CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write  # required for Workload Identity Federation

env:
  PYTHON_VERSION: "3.10"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install black flake8
      - name: Check formatting
        run: black --check src/ tests/
      - name: Lint
        run: flake8 src/ tests/

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  unit-test:
    runs-on: ubuntu-latest
    needs: [lint, secret-scan]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      # Pinned to match the target Dataproc image's Spark version exactly —
      # see 07-spark-migration/04-packaging-and-dependency-management.md
      - run: pip install pyspark==3.5.0 pytest pytest-cov -r requirements.txt
      - name: Run unit tests with coverage
        run: pytest tests/unit/ --cov=src --cov-fail-under=85 -v

  build-and-package:
    runs-on: ubuntu-latest
    needs: [unit-test]
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: version
        name: Determine version
        run: echo "version=$(python scripts/determine_version.py)" >> "$GITHUB_OUTPUT"
      - name: Build package
        run: |
          pip install build
          python -m build --wheel

  integration-test:
    runs-on: ubuntu-latest
    needs: [build-and-package]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.SERVICE_ACCOUNT_EMAIL }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Submit integration test batch to qa Dataproc Serverless
        run: |
          gcloud dataproc batches submit pyspark \
            tests/integration/run_integration_suite.py \
            --project="${{ vars.QA_PROJECT_ID }}" \
            --region="${{ vars.GCP_REGION }}" \
            --batch="integration-test-${{ github.sha }}"

  publish:
    runs-on: ubuntu-latest
    needs: [integration-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.SERVICE_ACCOUNT_EMAIL }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Publish artifact to GCS
        run: |
          gsutil cp dist/*.whl \
            "gs://${{ vars.ARTIFACT_BUCKET }}/jobs/${{ github.event.repository.name }}/${{ needs.build-and-package.outputs.version }}/"
      - name: Tag release
        run: |
          git tag "v${{ needs.build-and-package.outputs.version }}"
          git push origin "v${{ needs.build-and-package.outputs.version }}"
